services:
  authelia-selfserve:
    build: .
    container_name: authelia-selfserve
    restart: unless-stopped
    ports:
      - "8085:8000"
    env_file: .env
    volumes:
      # Mount the same volume / bind-mount that Authelia uses for its user database.
      # Adjust the source path to match your Authelia setup.
      - authelia_config:/data
    networks:
      - authelia

volumes:
  authelia_config:
    # If Authelia uses a named volume, reference it here with `external: true`
    # and make sure the volume name matches.
    external: true

networks:
  authelia:
    external: true
