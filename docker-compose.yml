services:
  authelia-selfserve:
    build: .
    container_name: authelia-selfserve
    restart: unless-stopped
    env_file: .env
    volumes:
      # Mount the same volume / bind-mount that Authelia uses for its user database.
      # Adjust the source path to match your Authelia setup.
      - authelia_config:/data
    networks:
      - authelia
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.authelia-selfserve.rule=Host(`register.example.com`)"
      - "traefik.http.routers.authelia-selfserve.entrypoints=websecure"
      - "traefik.http.routers.authelia-selfserve.tls.certresolver=letsencrypt"
      - "traefik.http.services.authelia-selfserve.loadbalancer.server.port=8000"

volumes:
  authelia_config:
    # If Authelia uses a named volume, reference it here with `external: true`
    # and make sure the volume name matches.
    external: true

networks:
  authelia:
    external: true
