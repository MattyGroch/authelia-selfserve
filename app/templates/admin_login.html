{% extends "base.html" %}
{% block title %}Admin Login &mdash; Authelia Self-Service{% endblock %}

{% block content %}
<div class="max-w-sm mx-auto">
  <h1 class="text-2xl font-bold mb-6">Admin Login</h1>

  {% if error %}
  <div class="bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 mb-6 text-sm">{{ error }}</div>
  {% endif %}

  <form method="post" action="/admin/login" class="space-y-5">
    <div>
      <label for="password" class="block text-sm font-medium mb-1">Password</label>
      <input type="password" id="password" name="password" required autofocus
             class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition">
    </div>
    <button type="submit"
            class="w-full bg-brand-600 hover:bg-brand-700 text-white font-semibold rounded-lg px-4 py-2.5 transition focus:outline-none focus:ring-2 focus:ring-brand-500 focus:ring-offset-2">
      Log In
    </button>
  </form>
</div>
{% endblock %}
