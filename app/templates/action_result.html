{% extends "base.html" %}
{% block title %}{{ title }} &mdash; Authelia Self-Service{% endblock %}

{% block content %}
<div class="max-w-md mx-auto text-center">
  {% if success %}
  <div class="inline-flex items-center justify-center w-16 h-16 bg-green-100 rounded-full mb-6">
    <svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
  </div>
  {% else %}
  <div class="inline-flex items-center justify-center w-16 h-16 bg-red-100 rounded-full mb-6">
    <svg class="w-8 h-8 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
  </div>
  {% endif %}

  <h1 class="text-2xl font-bold mb-3">{{ title }}</h1>
  <p class="text-gray-500">{{ message }}</p>

  <a href="/admin" class="inline-block mt-8 text-brand-600 hover:text-brand-700 font-medium transition">Go to Admin Dashboard &rarr;</a>
</div>
{% endblock %}
